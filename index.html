<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lapidary</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  :root {
    --bg:#0e0e0e; --surface:#181818; --ink:#e2dfd8;
    --dim:#6a6760; --line:#2e2e2e; --accent:#c8a96e; --spark:#e2c98c;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);}
  body{font-family:'Pretendard',sans-serif;color:var(--ink);display:flex;flex-direction:column;}

  /* HEADER */
  header{position:absolute;top:0;left:0;right:0;z-index:10;
    padding:28px 40px 0;display:flex;justify-content:space-between;
    align-items:flex-start;pointer-events:none;}
  .wordmark{font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:400;
    letter-spacing:.35em;text-transform:uppercase;color:var(--accent);opacity:.9;}
  .tagline{font-size:9px;letter-spacing:.12em;color:var(--dim);margin-top:4px;text-transform:uppercase;}
  .gem-count{font-size:9px;letter-spacing:.1em;color:var(--dim);text-align:right;}
  .gem-count span{display:block;font-size:22px;font-family:'Cormorant Garamond',serif;
    font-style:italic;color:var(--ink);opacity:.5;line-height:1;margin-bottom:2px;}

  /* AXIS SWITCHER */
  .axis-switcher{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);
    z-index:10;display:flex;gap:2px;background:rgba(20,20,20,.88);
    border:1px solid var(--line);padding:4px;backdrop-filter:blur(8px);}
  .axis-btn{font-family:'Pretendard',sans-serif;font-size:9px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--dim);background:transparent;
    border:1px solid transparent;padding:6px 14px;cursor:pointer;
    transition:all .2s;white-space:nowrap;}
  .axis-btn:hover{color:var(--ink);}
  .axis-btn.active{color:var(--accent);border-color:rgba(200,169,110,.3);
    background:rgba(200,169,110,.06);}

  /* SVG */
  #stage{width:100%;height:100%;}

  /* TOOLTIP */
  #tooltip{position:absolute;pointer-events:none;opacity:0;
    transition:opacity .15s;z-index:20;width:220px;}
  #tooltip.visible{opacity:1;}
  .tt-inner{background:rgba(20,20,20,.96);border:1px solid rgba(200,169,110,.25);
    padding:14px 16px;backdrop-filter:blur(12px);}
  .tt-name{font-family:'Pretendard',sans-serif;font-weight:700;font-size:18px;line-height:1.1;margin-bottom:2px;}
  .tt-name-ko{font-size:9px;letter-spacing:.1em;color:var(--dim);margin-bottom:10px;}
  .tt-row{display:flex;justify-content:space-between;font-size:9px;
    letter-spacing:.08em;margin-bottom:4px;color:var(--dim);}
  .tt-row span:last-child{color:var(--ink);}
  .tt-formula{font-family:'Pretendard',sans-serif;font-size:10px;color:var(--accent);
    margin-top:8px;letter-spacing:.04em;}
  .tt-lore{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;
    line-height:1.5;color:rgba(226,223,216,.5);margin-top:10px;
    border-top:1px solid var(--line);padding-top:10px;}
  .tt-progress{margin-top:10px;border-top:1px solid var(--line);padding-top:8px;}
  .tt-progress-label{font-size:8px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--dim);margin-bottom:5px;}
  .tt-progress-bar{height:1px;background:var(--line);position:relative;}
  .tt-progress-fill{position:absolute;top:0;left:0;height:1px;
    background:var(--accent);transition:width .25s ease-out;}
  .tt-progress-val{font-size:9px;color:var(--spark);margin-top:4px;letter-spacing:.08em;}

  /* SELECTED PANEL */
  #selected-panel{position:absolute;top:80px;right:40px;width:200px;
    opacity:0;transition:opacity .3s;pointer-events:none;z-index:10;}
  #selected-panel.visible{opacity:1;}
  .sp-label{font-size:8px;letter-spacing:.15em;text-transform:uppercase;
    color:var(--dim);margin-bottom:8px;}
  .sp-name{font-family:'Pretendard',sans-serif;font-weight:700;font-size:26px;line-height:1.1;margin-bottom:2px;}
  .sp-ko{font-size:9px;letter-spacing:.1em;color:var(--dim);margin-bottom:14px;}
  .sp-stat{margin-bottom:6px;}
  .sp-stat-label{font-size:8px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--dim);margin-bottom:2px;}
  .sp-bar-track{height:1px;background:var(--line);position:relative;}
  .sp-bar-fill{position:absolute;top:0;left:0;height:1px;
    transition:width .4s cubic-bezier(.4,0,.2,1);}
  .sp-lore{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;
    line-height:1.6;color:rgba(226,223,216,.5);margin-top:14px;}

  /* FLOAT COUNT */
  #float-count{position:absolute;left:50%;top:18px;transform:translateX(-50%);
    font-size:9px;letter-spacing:.18em;color:var(--dim);text-transform:uppercase;
    opacity:0;transition:opacity .5s;pointer-events:none;z-index:10;}
  #float-count.on{opacity:1;}
  #float-count b{color:var(--spark);font-weight:400;}

  /* RING LABELS */
  .ring-label{font-size:8px;letter-spacing:.12em;fill:var(--dim);
    text-transform:uppercase;opacity:.5;}

  /* ELEMENT GLYPHS */
  .elemGlyph text{font-family:'Pretendard',sans-serif;pointer-events:none;text-anchor:middle;}

  .interaction-mode{
    position:fixed;bottom:32px;right:40px;
    z-index:10;display:flex;gap:2px;
    background:rgba(14,14,14,.88);
    border:1px solid var(--line);padding:4px;
    backdrop-filter:blur(8px);
  }
  .mode-btn{
    font-family:'Pretendard',sans-serif;font-size:9px;
    letter-spacing:.12em;text-transform:uppercase;
    color:var(--dim);background:transparent;
    border:1px solid transparent;padding:6px 14px;
    cursor:pointer;transition:all .2s;white-space:nowrap;
  }
  .mode-btn:hover{color:var(--ink);}
  .mode-btn.active{
    color:var(--accent);border-color:rgba(200,169,110,.3);
    background:rgba(200,169,110,.06);
  }
  /* ACTIVITY LOG */
  #activity-log{
    position:fixed;left:38px;bottom:80px;
    pointer-events:none;z-index:9999;
    display:flex;flex-direction:column;gap:6px;
    max-width:500px;
  }
  .log-entry{
    display:flex;align-items:center;gap:5px;flex-wrap:wrap;
    opacity:0;animation:logIn .35s ease-out forwards;
  }
  .log-entry.removing{ animation:logOut .5s ease-in forwards; }
  .log-entry.destroy{ border-left:2px solid rgba(220,90,70,.55);padding-left:8px; }
  .log-entry.synth  { border-left:2px solid rgba(80,200,140,.55);padding-left:8px; }
  .log-badge{
    font-size:8px;font-weight:700;letter-spacing:.08em;
    padding:2px 6px;border-radius:3px;flex-shrink:0;
  }
  .log-badge.destroy{
    background:rgba(220,90,70,.14);color:#e07060;
    border:1px solid rgba(220,90,70,.35);
  }
  .log-badge.synth{
    background:rgba(80,200,140,.12);color:#60c890;
    border:1px solid rgba(80,200,140,.35);
  }
  .log-gem-box{
    display:flex;align-items:center;gap:5px;
    padding:4px 9px;border-radius:5px;border:1px solid;
    font-family:'Pretendard',sans-serif;font-size:10px;font-weight:600;
    letter-spacing:.03em;white-space:nowrap;
  }
  .log-gem-dot{ width:6px;height:6px;border-radius:50%;flex-shrink:0; }
  .log-gem-name{ color:var(--ink); }
  .log-arrow{ color:var(--dim);font-size:10px;flex-shrink:0;opacity:.6; }
  .log-elements{ display:flex;gap:3px;flex-wrap:wrap; }
  .log-elem{
    padding:3px 6px;border-radius:5px;border:1px solid;
    font-family:'Pretendard',sans-serif;font-size:9px;font-weight:500;
    letter-spacing:.04em;
  }
  @keyframes logIn{
    from{opacity:0;transform:translateX(-18px);}
    to  {opacity:1;transform:translateX(0);}
  }
  @keyframes logOut{
    from{opacity:1;transform:translateY(0);}
    to  {opacity:0;transform:translateY(-14px);}
  }

  /* HARBINGER */
  @keyframes harbPulse {
    0%   { opacity:0;    transform:scale(1.15); }
    18%  { opacity:0.65; transform:scale(1.0);  }
    100% { opacity:0;    transform:scale(0.12); }
  }
  .harbinger-ring {
    transform-box:fill-box; transform-origin:center;
    animation: harbPulse 1.3s ease-in forwards;
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="wordmark">Lapidary</div>
    <div class="tagline">보석 색상 아틀라스</div>
  </div>
  <div class="gem-count"><span id="count-num">—</span>종</div>
</header>

<svg id="stage"></svg>

<div class="axis-switcher">
  <button class="axis-btn active" data-axis="color">색상</button>
  <button class="axis-btn" data-axis="price">가격</button>
  <button class="axis-btn" data-axis="hardness">경도</button>
  <button class="axis-btn" data-axis="rarity">희소도</button>
  <button class="axis-btn" data-axis="origin">원산지</button>
</div>

<div class="interaction-mode">
  <button class="mode-btn active" data-mode="single">단일 선택</button>
  <button class="mode-btn" data-mode="area">범위 파괴</button>
</div>

<div id="tooltip">
  <div class="tt-inner">
    <div class="tt-name" id="tt-name"></div>
    <div class="tt-name-ko" id="tt-name-ko"></div>
    <div class="tt-row"><span>원산지</span><span id="tt-origin"></span></div>
    <div class="tt-row"><span>경도</span><span id="tt-hard"></span></div>
    <div class="tt-row"><span>가격대</span><span id="tt-price"></span></div>
    <div class="tt-row"><span>희소도</span><span id="tt-rarity"></span></div>
    <div class="tt-formula" id="tt-formula"></div>
    <div class="tt-progress">
      <div class="tt-progress-label">파괴 저항</div>
      <div class="tt-progress-bar"><div class="tt-progress-fill" id="tt-pfill"></div></div>
      <div class="tt-progress-val" id="tt-pval"></div>
    </div>
    <div class="tt-lore" id="tt-lore"></div>
  </div>
</div>

<div id="selected-panel">
  <div class="sp-label">선택된 보석</div>
  <div class="sp-name" id="sp-name"></div>
  <div class="sp-ko" id="sp-ko"></div>
  <div class="sp-stat">
    <div class="sp-stat-label">경도</div>
    <div class="sp-bar-track"><div class="sp-bar-fill" id="sp-bar-hard"></div></div>
  </div>
  <div class="sp-stat">
    <div class="sp-stat-label">희소도</div>
    <div class="sp-bar-track"><div class="sp-bar-fill" id="sp-bar-rarity"></div></div>
  </div>
  <div class="sp-stat">
    <div class="sp-stat-label">가격대</div>
    <div class="sp-bar-track"><div class="sp-bar-fill" id="sp-bar-price"></div></div>
  </div>
  <div class="sp-lore" id="sp-lore"></div>
</div>

<div id="float-count">부유 원소 <b>0</b></div>
<div id="activity-log"></div>

<script>

const seen = new Set();
const GEMS = GEMS_RAW.filter(g=>{ if(seen.has(g.id)) return false; seen.add(g.id); return true; });
GEMS.forEach((g,i)=>{
  const ov = GEM_OVERRIDE[g.id];
  const ct = CAT_ELEM[g.category];
  const src = ov || ct || {f:"SiO\u2082", e:["Si","O"]};
  g.formula = src.f; g.elements = src.e;
  // 결정론적 지터 (id 해시 기반)
  const h = g.id.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  g._j1 = ((h*7919)%100)/100;
  g._j2 = ((h*6271)%100)/100;
  g._clicks = 0; g._breaking = false;
});

document.getElementById('count-num').textContent = GEMS.length;

// ── 원소 출현 빈도 + 상시 원소 계산 ─────────────────────────────
// AMBIENT_THRESHOLD(60%) 이상 보석에 포함되는 원소 → 합성 반경 체크 면제
const ELEM_FREQ_MAP = {};
GEMS.forEach(g => {
  [...new Set(g.elements)].forEach(e => {
    ELEM_FREQ_MAP[e] = (ELEM_FREQ_MAP[e]||0) + 1;
  });
});
const AMBIENT_THRESHOLD = 0.97; // O(97%)만 면제 — Si는 개별 formula_counts에서 관리
const AMBIENT_ELEMS = new Set(
  Object.entries(ELEM_FREQ_MAP)
    .filter(([,n]) => n/GEMS.length >= AMBIENT_THRESHOLD)
    .map(([e]) => e)
);

let W, H, cx, cy, outerR;
function resize(){
  W = window.innerWidth; H = window.innerHeight;
  cx = W/2; cy = H/2 + 10;
  outerR = Math.min(W,H) * 0.40;
  svgEl.attr('width',W).attr('height',H);
}
resize();

const ACHROMATIC_T = 12;
const ACHROMATIC_R = 42;
const INNER_R_MIN  = 60;

// ══ FLOATING ORBIT ════════════════════════════════════════════════
const floatingList = [];
let loopStarted = false;
const fcEl = document.getElementById('float-count');
function bumpCount(){ fcEl.classList.add('on'); fcEl.querySelector('b').textContent = floatingList.length; }

function startFloatLoop(){
  if(loopStarted) return; loopStarted = true;
  function step(now){
    for(const p of floatingList){
      const dt    = now - p.entryTime;
      const theta = p.theta0 + p.omega * dt;
      const x     = cx + p.r0 * Math.cos(theta);
      const y     = cy + p.r0 * Math.sin(theta);
      const decay = Math.max(0, 1 - dt/600);
      const rot   = p.flightRotEnd * decay;
      p.node.setAttribute('transform',`translate(${x},${y}) rotate(${rot})`);
    }
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function hexA(hex,a){ const c=d3.color(hex); c.opacity=a; return c.toString(); }

// ══ GEM SIZE ══════════════════════════════════════════════════════
function gemR(d){ return 4 + d.price_tier*0.7 + d.rarity*0.4; }

// ══ POSITION FUNCTIONS ════════════════════════════════════════════
function posColor(d){
  if(d.chroma < ACHROMATIC_T){
    const ach = GEMS.filter(g=>g.chroma < ACHROMATIC_T);
    const idx = ach.indexOf(d); const n = ach.length;
    const a = (idx/n)*Math.PI*2;
    const r = ACHROMATIC_R*(0.4+0.6*(d.lightness/100));
    return {x: cx+r*Math.cos(a), y: cy+r*Math.sin(a)};
  }
  const angle = (d.hue/360)*Math.PI*2 - Math.PI/2;
  const r = d3.scaleLinear().domain([0,100]).range([INNER_R_MIN, outerR])(d.chroma);
  return {x: cx+r*Math.cos(angle), y: cy+r*Math.sin(angle)};
}
function posPrice(d){
  const tR = {1:outerR*.18, 2:outerR*.36, 3:outerR*.54, 4:outerR*.72, 5:outerR*.90};
  const angle = (d.hue/360)*Math.PI*2 - Math.PI/2;
  const r = tR[d.price_tier] + (d._j1-.5)*outerR*.06;
  return {x: cx+r*Math.cos(angle), y: cy+r*Math.sin(angle)};
}
function posHardness(d){
  const angle = (d.hue/360)*Math.PI*2 - Math.PI/2;
  const r = d3.scaleLinear().domain([1,10]).range([outerR*.12, outerR])(d.hardness);
  return {x: cx+r*Math.cos(angle), y: cy+r*Math.sin(angle)};
}
function posRarity(d){
  const angle = (d.hue/360)*Math.PI*2 - Math.PI/2;
  const r = d3.scaleLinear().domain([1,5]).range([outerR*.15, outerR])(d.rarity) + (d._j1-.5)*outerR*.08;
  return {x: cx+r*Math.cos(angle), y: cy+r*Math.sin(angle)};
}
const ORIGIN_ANG = {
  'Brazil':10,'Colombia':25,'Russia':50,'Myanmar':80,'Sri Lanka':100,'India':115,
  'Afghanistan':130,'Pakistan':145,'Australia':175,'South Africa':200,'Tanzania':220,
  'Kenya':235,'Mozambique':250,'Madagascar':265,'Zambia':280,'Congo':295,'USA':320,
  'Canada':340,'Iran':355,'Japan':5,'France':30,'China':60,'Turkey':70,'Finland':165,
  'Norway':155,'Mali':95,'Mexico':190,'Morocco':210,'Dominican Republic':245,
  'Tajikistan':120,'Czech Republic':310,'Cambodia':330,'Botswana':230,'Kashmir':110,
  'French Polynesia':185,'Baltic':350,'Nepal':125,'Namibia':215,'Niger':75,'Nigeria':75,
  'Democratic Republic of Congo':295,
};
function posOrigin(d){
  const base = ORIGIN_ANG[d.origin_primary] || (d.id.charCodeAt(0)%360);
  const angle = (base/360)*Math.PI*2 - Math.PI/2;
  const r = d3.scaleLinear().domain([1,5]).range([outerR*.3, outerR*.9])(d.rarity);
  return {x: cx+r*Math.cos(angle), y: cy+r*Math.sin(angle)};
}
function getPos(d,axis){
  switch(axis){
    case 'price':     return posPrice(d);
    case 'hardness':  return posHardness(d);
    case 'rarity':    return posRarity(d);
    case 'origin':    return posOrigin(d);
    default:          return posColor(d);
  }
}

// ══ RINGS ═════════════════════════════════════════════════════════
function drawRings(axis){
  gRings.selectAll('*').remove();
  const dc = '#2e2e2e';
  if(axis==='color'){
    [.3,.6,1].forEach(f=>{
      gRings.append('circle').attr('cx',cx).attr('cy',cy).attr('r',outerR*f)
        .attr('fill','none').attr('stroke',dc).attr('stroke-width',.5).attr('stroke-dasharray','2 6');
    });
    gRings.append('circle').attr('cx',cx).attr('cy',cy).attr('r',ACHROMATIC_R+16)
      .attr('fill','none').attr('stroke',dc).attr('stroke-width',.5);
  } else if(axis==='price'){
    ['일반','저가','중가','고급','최상급'].forEach((l,i)=>{
      const f=[.18,.36,.54,.72,.90][i];
      gRings.append('circle').attr('cx',cx).attr('cy',cy).attr('r',outerR*f)
        .attr('fill','none').attr('stroke',dc).attr('stroke-width',.5).attr('stroke-dasharray','2 6');
      gRings.append('text').attr('x',cx).attr('y',cy-outerR*f-4)
        .attr('text-anchor','middle').attr('class','ring-label').text(l);
    });
  } else if(axis==='hardness'){
    [3,5,7,9].forEach(h=>{
      const r=d3.scaleLinear().domain([1,10]).range([outerR*.12,outerR])(h);
      gRings.append('circle').attr('cx',cx).attr('cy',cy).attr('r',r)
        .attr('fill','none').attr('stroke',dc).attr('stroke-width',.5).attr('stroke-dasharray','2 6');
      gRings.append('text').attr('x',cx+4).attr('y',cy-r-3)
        .attr('class','ring-label').text(h);
    });
  } else if(axis==='rarity'){
    ['흔함','비교적 희귀','희귀','매우 희귀','전설급'].forEach((l,i)=>{
      const r=d3.scaleLinear().domain([1,5]).range([outerR*.15,outerR])(i+1);
      gRings.append('circle').attr('cx',cx).attr('cy',cy).attr('r',r)
        .attr('fill','none').attr('stroke',dc).attr('stroke-width',.5).attr('stroke-dasharray','2 6');
      gRings.append('text').attr('x',cx+4).attr('y',cy-r-3)
        .attr('class','ring-label').text(l);
    });
  } else if(axis==='origin'){
    Object.entries(ORIGIN_ANG).forEach(([region,deg])=>{
      const a=(deg/360)*Math.PI*2-Math.PI/2;
      gRings.append('line')
        .attr('x1',cx+outerR*.25*Math.cos(a)).attr('y1',cy+outerR*.25*Math.sin(a))
        .attr('x2',cx+outerR*1.02*Math.cos(a)).attr('y2',cy+outerR*1.02*Math.sin(a))
        .attr('stroke',dc).attr('stroke-width',.5);
      gRings.append('text')
        .attr('x',cx+outerR*1.06*Math.cos(a)).attr('y',cy+outerR*1.06*Math.sin(a))
        .attr('text-anchor','middle').attr('dominant-baseline','middle')
        .attr('class','ring-label').attr('font-size','7px').text(region);
    });
  }
}

// ══ GEM SEPARATION ───────────────────────────────────────────────
// 포지션 계산 후 최소 거리 이하로 겹치는 보석들을 반발력으로 밀어냄
function separateGems(gems, gap=5, iters=60){
  for(let k=0; k<iters; k++){
    let moved = false;
    for(let i=0; i<gems.length-1; i++){
      for(let j=i+1; j<gems.length; j++){
        const a=gems[i], b=gems[j];
        const dx=b._x-a._x, dy=b._y-a._y;
        const d=Math.hypot(dx,dy);
        const minD=gemR(a)+gemR(b)+gap;
        if(d<minD && d>0.001){
          const push=(minD-d)/2, nx=dx/d, ny=dy/d;
          a._x-=nx*push; a._y-=ny*push;
          b._x+=nx*push; b._y+=ny*push;
          moved=true;
        }
      }
    }
    if(!moved) break;
  }
}

// ══ RENDER ════════════════════════════════════════════════════════
let currentAxis = 'color';
function render(axis, animate){
  drawRings(axis);
  // 위치 갱신 + 겹침 분리
  GEMS.forEach(d=>{ const p=getPos(d,axis); d._x=p.x; d._y=p.y; });
  separateGems(GEMS);

  const sel = gGems.selectAll('.gem-pos').data(GEMS, d=>d.id);

  // ENTER
  const enter = sel.enter().append('g').attr('class','gem-pos')
    .attr('transform', d=>`translate(${d._x},${d._y})`);

  const inner = enter.append('g').attr('class','gem');

  inner.append('circle').attr('class','gem-halo')
    .attr('r', d=>gemR(d)*2.2).attr('fill','none')
    .attr('stroke', d=>hexA(d.hex,.6)).attr('stroke-width',.5).style('opacity',0);

  inner.append('circle').attr('class','gem-dot')
    .attr('r', d=>gemR(d))
    .attr('fill', d=>hexA(d.hex,.78))
    .attr('stroke', d=>hexA(d.hex,.9)).attr('stroke-width',.8);

  inner.append('circle').attr('class','gem-progress')
    .attr('r', d=>{ d._pR=gemR(d)+5; d._circ=2*Math.PI*d._pR; return d._pR; })
    .attr('transform','rotate(-90)').attr('fill','none').attr('stroke-width',1.2)
    .attr('stroke', d=>hexA(d.hex,.9))
    .attr('stroke-dasharray', d=>`0 ${d._circ}`);

  // 등장 애니메이션
  inner.style('opacity',0).transition().duration(700).delay((_,i)=>i*5).style('opacity',1);

  // 이벤트 (enter에만, 기존은 이미 바인딩됨)
  enter
    .on('mouseenter', function(event,d){
      showTooltip(event,d);
      if(!d._breaking){
        d3.select(this).select('.gem-halo').style('opacity',.5);
        d3.select(this).select('.gem-dot').attr('r',gemR(d)*1.35);
      }
    })
    .on('mousemove', (event,d)=>showTooltip(event,d))
    .on('mouseleave', function(event,d){
      hideTooltip();
      if(!d._breaking){
        d3.select(this).select('.gem-halo').style('opacity',0);
        d3.select(this).select('.gem-dot').attr('r',gemR(d));
      }
    })
    .on('click', function(event,d){ if(interactionMode==='area') return; onGemClick(event,d); });

  // ENTER + UPDATE → 위치 전환
  const all = enter.merge(sel);
  if(animate){
    all.transition().duration(820).delay((_,i)=>i*4).ease(d3.easeCubicInOut)
      .attr('transform', d=>`translate(${d._x},${d._y})`);
  } else {
    all.attr('transform', d=>`translate(${d._x},${d._y})`);
  }
  // ── GLOW 레이어 — 모든 보석 dot 아래에 별도 패스로 렌더 ──────
  const glowSel = gGlow.selectAll('.gem-glow-pos:not(.synth-glow)').data(GEMS, d=>d.id);
  const glowEnt = glowSel.enter().append('g').attr('class','gem-glow-pos')
    .attr('transform', d=>`translate(${d._x},${d._y})`);
  [[3.2,0.04],[2.0,0.09],[1.38,0.16]].forEach(([s,op])=>{
    glowEnt.append('circle')
      .attr('r', d=>gemR(d)*s)
      .attr('fill', d=>hexA(d.hex,op))
      .attr('stroke','none');
  });
  glowEnt.style('opacity',0).transition().duration(700).delay((_,i)=>i*5).style('opacity',1);
  const allGlow = glowEnt.merge(glowSel);
  if(animate){
    allGlow.transition().duration(820).delay((_,i)=>i*4).ease(d3.easeCubicInOut)
      .attr('transform', d=>`translate(${d._x},${d._y})`);
  } else {
    allGlow.attr('transform', d=>`translate(${d._x},${d._y})`);
  }
  glowSel.exit().remove();

  sel.exit().remove();

  // 합성 보석도 축 전환 시 위치 갱신 + 겹침 재계산
  synthGems.forEach(sg => {
    const base   = getPos(sg.gemData, axis);
    const target = findFreePos(base, gemR(sg.gemData));
    sg.pos = target;
    const moveNode = n => {
      if(!n) return;
      if(animate){
        d3.select(n).transition().duration(820).delay(Math.random()*150)
          .ease(d3.easeCubicInOut).attr('transform',`translate(${target.x},${target.y})`);
      } else {
        d3.select(n).attr('transform',`translate(${target.x},${target.y})`);
      }
    };
    moveNode(sg.node);
    moveNode(sg.glowNode);
  });
}

// ══ TOOLTIP ═══════════════════════════════════════════════════════
const tooltip = document.getElementById('tooltip');
const PRICE_L = ['','일반','저가','중가','고급','최상급'];
const RARITY_L= ['','흔함','비교적 희귀','희귀','매우 희귀','전설급'];

function showTooltip(event, d){
  document.getElementById('tt-name').textContent = d.name_ko;
  document.getElementById('tt-name-ko').textContent = d.name;
  document.getElementById('tt-origin').textContent = d.origin_primary;
  document.getElementById('tt-hard').textContent = d.hardness+' / 10';
  document.getElementById('tt-price').textContent = PRICE_L[d.price_tier];
  document.getElementById('tt-rarity').textContent = RARITY_L[d.rarity];
  document.getElementById('tt-formula').textContent = d.formula;
  document.getElementById('tt-lore').textContent = d.lore;
  // 분해 진행도
  const pct = Math.min((d._clicks||0)/d.h,1)*100;
  document.getElementById('tt-pfill').style.width = pct+'%';
  document.getElementById('tt-pfill').style.background = d.hex;
  document.getElementById('tt-pval').textContent = d._breaking
    ? d.name_ko+' \u2192 '+d.elements.join(' \u00b7 ')
    : `${d._clicks||0} / ${d.hardness}`;
  let tx=event.pageX+16, ty=event.pageY-10;
  if(tx+240>W) tx=event.pageX-244;
  if(ty+300>H) ty=H-310;
  tooltip.style.left=tx+'px'; tooltip.style.top=ty+'px';
  tooltip.classList.add('visible');
}
function hideTooltip(){ tooltip.classList.remove('visible'); }

// ══ SELECTED PANEL ════════════════════════════════════════════════
function showPanel(d){
  document.getElementById('sp-name').textContent = d.name_ko;
  document.getElementById('sp-ko').textContent   = d.name;
  ['hard','rarity','price'].forEach(k=>{
    const el=document.getElementById('sp-bar-'+k);
    el.style.width = (k==='hard'?d.hardness/10:k==='rarity'?d.rarity/5:d.price_tier/5)*100+'%';
    el.style.background = d.hex;
  });
  document.getElementById('sp-lore').textContent = d.lore;
  document.getElementById('selected-panel').classList.add('visible');
}

// ══ CLICK / DECOMPOSE ════════════════════════════════════════════
function onGemClick(event, d){
  if(d._breaking) return;
  showPanel(d);
  d._clicks = (d._clicks||0)+1;
  const node = event.currentTarget;
  const g = d3.select(node);
  const p = Math.min(d._clicks/d.hardness,1);
  g.select('.gem-progress').attr('stroke-dasharray',`${p*d._circ} ${d._circ}`);
  g.select('.gem-dot').transition().duration(80).attr('r',gemR(d)*1.5)
    .transition().duration(160).attr('r',gemR(d));
  if(d._clicks >= d.hardness) decompose(node, d);
}

function decompose(node, d){
  d._breaking = true;
  const g = d3.select(node);
  const R = gemR(d);

  // 실제 화면 위치 (회전 적용)
  const abs = toAbsolute(d._x, d._y);

  // 충격파 링 — 절대 좌표계(floatersG)에 배치
  const sw = floatersG.append('g').attr('transform',`translate(${abs.x},${abs.y})`);
  sw.append('circle').attr('r',R*1.2).attr('fill','none')
    .attr('stroke',hexA(d.hex,.85)).attr('stroke-width',2.4)
    .transition().duration(650).ease(d3.easeQuadOut)
    .attr('r',R*22).attr('stroke-width',.2).style('opacity',0)
    .on('end',function(){ sw.remove(); });

  g.select('.gem-dot')
    .transition().duration(80).attr('r',R*2.8).attr('stroke-width',3)
    .transition().duration(400).attr('r',0).style('opacity',0);
  g.select('.gem-halo')
    .transition().duration(520).attr('r',outerR*.3).style('opacity',0);
  g.select('.gem-progress').transition().duration(400).style('opacity',0);
  gGlow.selectAll('.gem-glow-pos').filter(gd=>gd && gd.id===d.id)
    .transition().duration(300).style('opacity',0);

  // 불순물 원소 소량 방출 (지구과학적 발색단·미량 치환 원소)
  const impElems = GEM_IMPURITIES[d.id] || [];
  const abs0 = toAbsolute(d._x, d._y);
  impElems.forEach((sym, ei) => {
    const eData = ELEMENT_DATA[sym]||{mass:14,color:'#e2dfd8'};
    const omega  = BASE_OMEGA / Math.sqrt(eData.mass/1.008);
    const ang    = Math.random()*Math.PI*2;
    const donutR = outerR * (1.08 + Math.random() * 0.42);
    const tx = cx + Math.cos(ang)*donutR, ty = cy + Math.sin(ang)*donutR;
    const fpeak = (Math.random()-.5)*360, fend = (Math.random()-.5)*28;
    const delay = ei * 40 + 20;
    const sx = abs0.x, sy = abs0.y;
    const trail = floatersG.append('line')
      .attr('x1',sx).attr('y1',sy).attr('x2',sx).attr('y2',sy)
      .attr('stroke', hexA(d.hex, 0.28)).attr('stroke-width',1.2)
      .attr('stroke-linecap','round').attr('stroke-dasharray','4 4').style('opacity',0);
    trail.transition().delay(delay+130).duration(1400).ease(d3.easeQuadOut)
      .attr('x2',tx).attr('y2',ty).style('opacity',0.28)
      .transition().duration(350).style('opacity',0)
      .on('end',function(){ d3.select(this).remove(); });
    const eg = floatersG.append('g').attr('class','elemGlyph')
      .style('opacity',0).style('filter','grayscale(0) brightness(1)')
      .attr('transform',`translate(${sx},${sy})`);
    eg.append('circle').attr('r',5)
      .attr('fill',hexA(eData.color,.08)).attr('stroke',hexA(eData.color,.55)).attr('stroke-width',.8)
      .attr('stroke-dasharray','2 3');
    eg.append('text').attr('dy','.35em').attr('fill',eData.color)
      .attr('font-size','7px').text(sym);
    const fd2 = 1400 + Math.random()*400;
    eg.transition().delay(delay).duration(110).style('opacity',.7)
      .transition().duration(fd2).ease(d3.easeQuadOut)
      .attrTween('transform',function(){
        return u=>{
          const x=sx+(tx-sx)*u, y=sy+(ty-sy)*u;
          return `translate(${x},${y}) rotate(${fpeak*Math.sin(u*Math.PI)+fend*u})`;
        };
      })
      .on('end',function(){
        const r0=Math.hypot(tx-cx,ty-cy), theta0=Math.atan2(ty-cy,tx-cx);
        const omegaK = omega / Math.sqrt(Math.max(r0,1) / outerR); // 케플러: 바깥 궤도일수록 느리게
        floatingList.push({node:this,r0,theta0,entryTime:performance.now(),omega:omegaK,flightRotEnd:fend,absX:tx,absY:ty,gemId:d.id,sym});
        bumpCount(); startFloatLoop();
      });
    eg.transition('color').delay(delay+130+fd2).duration(10000).ease(d3.easeLinear)
      .style('opacity',.5).style('filter','grayscale(1) brightness(0.55)');
  });

  addLog('destroy', d.name_ko, d.elements, d.hex);

  const N_PER = 3;
  d.elements.forEach((sym,ei)=>{
    const eData = ELEMENT_DATA[sym]||{mass:14,color:'#e2dfd8'};
    const omega  = BASE_OMEGA / Math.sqrt(eData.mass/1.008);
    for(let i=0;i<N_PER;i++){
      const ang    = Math.random()*Math.PI*2;
      const donutR = outerR * (1.08 + Math.random() * 0.42);
      const tx     = cx + Math.cos(ang)*donutR;
      const ty     = cy + Math.sin(ang)*donutR;
      const fpeak  = (Math.random()-.5)*360;
      const fend   = (Math.random()-.5)*28;
      const delay  = ei*35+i*18;
      const sx=abs.x, sy=abs.y;

      const eg = floatersG.append('g').attr('class','elemGlyph')
        .style('opacity',0)
        .style('filter','grayscale(0) brightness(1)')
        .attr('transform',`translate(${sx},${sy})`);
      eg.append('circle').attr('r',7)
        .attr('fill',hexA(eData.color,.1)).attr('stroke',hexA(eData.color,.7)).attr('stroke-width',1);
      eg.append('text').attr('dy','.35em').attr('fill',eData.color)
        .attr('font-size','8px').attr('letter-spacing','.04em').text(sym);

      const flightDur = 1250 + Math.random()*450;

      // 비행 trail — 원소보다 먼저 append해서 아래 레이어에 렌더
      const trail = floatersG.append('line')
        .attr('x1',sx).attr('y1',sy)
        .attr('x2',sx).attr('y2',sy)
        .attr('stroke', hexA(d.hex, 0.38))
        .attr('stroke-width', 1.6)
        .attr('stroke-linecap','round')
        .style('opacity',0);
      trail.transition().delay(delay+130).duration(flightDur).ease(d3.easeQuadOut)
        .attr('x2',tx).attr('y2',ty).style('opacity',0.38)
        .transition().duration(380).style('opacity',0)
        .on('end',function(){ d3.select(this).remove(); });

      // transform 전용 (무명 transition)
      eg.transition().delay(delay).duration(130).style('opacity',.85)
        .transition().duration(flightDur).ease(d3.easeQuadOut)
        .attrTween('transform',function(){
          return u=>{
            const x=sx+(tx-sx)*u, y=sy+(ty-sy)*u;
            const r=fpeak*Math.sin(u*Math.PI)+fend*u;
            return `translate(${x},${y}) rotate(${r})`;
          };
        })
        .on('end',function(){
          const r0     = Math.hypot(tx-cx, ty-cy);
          const theta0 = Math.atan2(ty-cy, tx-cx);
          const omegaK2 = omega / Math.sqrt(Math.max(r0,1) / outerR);
          floatingList.push({node:this, r0, theta0, entryTime:performance.now(), omega:omegaK2, flightRotEnd:fend, absX:tx, absY:ty, gemId:d.id, sym});
          bumpCount(); startFloatLoop();
        });

      // 착지 후부터 서서히 탈색 — 비행 중엔 원색 유지
      eg.transition('color').delay(delay + 130 + flightDur).duration(10000).ease(d3.easeLinear)
        .style('opacity', 0.5)
        .style('filter', 'grayscale(1) brightness(0.55)');
    }
  });

}

// ══ ACTIVITY LOG ═════════════════════════════════════════════════
const LOG_MAX = 15;

// 일괄파괴 배칭: area 모드에서 개별 로그 대신 단건 요약 처리
let _batchingDestroy = false;
let _batchQueue = [];

function addLog(type, gemNameKo, elements, hex){
  if(type === 'destroy' && _batchingDestroy){
    _batchQueue.push({gemNameKo, elements, hex});
    return;
  }
  _appendLogEntry(type, gemNameKo, elements, hex);
}

function _flushBatch(){
  if(_batchQueue.length === 0) return;
  if(_batchQueue.length === 1){
    const {gemNameKo,elements,hex} = _batchQueue[0];
    _appendLogEntry('destroy', gemNameKo, elements, hex);
  } else {
    // 요약 단건 로그
    const names = _batchQueue.slice(0,3).map(g=>g.gemNameKo).join(', ')
      + (_batchQueue.length > 3 ? ` 외 ${_batchQueue.length-3}종` : '');
    const allElems = [...new Set(_batchQueue.flatMap(g=>g.elements))];
    _appendLogEntry('destroy', `${_batchQueue.length}종 범위 파괴 (${names})`, allElems, '#c8a96e');
  }
  _batchQueue = [];
}

function _appendLogEntry(type, gemNameKo, elements, hex){
  const log = document.getElementById('activity-log');
  if(!log) return;
  const uniqueElems = [...new Set(elements)];
  const entry = document.createElement('div');
  entry.className = 'log-entry ' + type;

  const badge = `<span class="log-badge ${type}">${type==='destroy'?'파괴':'합성'}</span>`;

  const gemBox =
    `<div class="log-gem-box" style="border-color:${hexA(hex,.4)};background:${hexA(hex,.07)}">` +
    `<span class="log-gem-dot" style="background:${hex}"></span>` +
    `<span class="log-gem-name">${gemNameKo}</span>` +
    `</div>`;

  const elemBoxes = uniqueElems.map(sym=>{
    const ec = (ELEMENT_DATA[sym]||{color:'#aaaaaa'}).color;
    return `<span class="log-elem" style="color:${ec};border-color:${hexA(ec,.38)};background:${hexA(ec,.07)}">${sym}</span>`;
  }).join('');
  const elems = `<div class="log-elements">${elemBoxes}</div>`;
  const arrow = `<span class="log-arrow">→</span>`;

  entry.innerHTML = type==='destroy'
    ? badge + gemBox + arrow + elems
    : badge + elems + arrow + gemBox;

  log.appendChild(entry);
  if(log.children.length > LOG_MAX){
    const oldest = log.firstChild;
    oldest.classList.add('removing');
    setTimeout(()=>{ if(oldest.parentNode) oldest.remove(); }, 500);
  }
}

// ══ SYNTHESIS ════════════════════════════════════════════════════
// scatter 직후 재합성 방지: 공전 12초 이상 된 원소만 대상
const MIN_ORBIT_AGE = 12000;
// 같은 보석 종류 연속 합성 방지 쿨타임
const LAST_SYNTH    = {};
const synthGems     = [];

function elemCurPos(p){
  const dt    = performance.now() - p.entryTime;
  const theta = p.theta0 + p.omega * dt;
  return { x: cx + p.r0*Math.cos(theta), y: cy + p.r0*Math.sin(theta) };
}

// 황금각 나선으로 겹치지 않는 빈 자리 탐색
function findFreePos(base, newR){
  const gap = newR + 12;
  let pos = {...base};
  for(let k=0; k<20; k++){
    let ok = true;
    for(const g of GEMS){
      if(g._x==null) continue;
      if(Math.hypot(pos.x-g._x, pos.y-g._y) < gap+gemR(g)){ ok=false; break; }
    }
    if(ok){
      for(const s of synthGems){
        if(Math.hypot(pos.x-s.pos.x, pos.y-s.pos.y) < gap+gemR(s.gemData)){ ok=false; break; }
      }
    }
    if(ok) return pos;
    const a = k * 2.3999; // 황금각
    const r = gap * 1.9 * (0.4 + k*0.12);
    pos = { x: base.x + r*Math.cos(a), y: base.y + r*Math.sin(a) };
  }
  return pos;
}

// 가치 반비례 합성 반경
function gemSynthR(gem){
  const score = (gem.price_tier||1) + (gem.rarity||1);
  const t = (score - 2) / 8;
  return outerR * (0.28 - 0.22 * t);
}

function checkSynthesis(){
  const now = performance.now();
  const eligible = floatingList.filter(p => now - p.entryTime > MIN_ORBIT_AGE);
  if(eligible.length < 2) return;
  eligible.forEach(p => { p._cur = elemCurPos(p); });

  // 가중 랜덤 우선순위: 고가 보석이 평균적으로 먼저 체크됨
  const checkOrder = [...GEMS].sort((a,b)=>{
    const wA = (a.price_tier * a.rarity) * (0.6 + Math.random() * 0.8);
    const wB = (b.price_tier * b.rarity) * (0.6 + Math.random() * 0.8);
    return wB - wA;
  });

  for(const gem of checkOrder){
    if(LAST_SYNTH[gem.id] && now - LAST_SYNTH[gem.id] < 20000) continue;

    const fc      = GEM_FORMULA_COUNTS[gem.id];
    const impArr  = GEM_IMPURITIES[gem.id] || [];
    if(!fc) continue;

    const sR = gemSynthR(gem);

    // ① 화학식 원소 후보 풀 확인 (개수 포함)
    const byType = {};
    let missing = false;
    for(const [e, count] of Object.entries(fc)){
      if(AMBIENT_ELEMS.has(e)) continue; // O 면제
      byType[e] = eligible.filter(p => p.sym === e);
      if(byType[e].length < count){ missing=true; break; }
    }
    if(missing) continue;

    // ② 불순물 후보 풀 확인
    const impPool = impArr.length > 0
      ? eligible.filter(p => impArr.includes(p.sym))
      : null; // null = 불순물 불필요
    if(impArr.length > 0 && impPool.length === 0) continue;

    // ③ anchor 기반 클러스터 탐색
    const fcEntries = Object.entries(fc).filter(([e])=>!AMBIENT_ELEMS.has(e));
    if(fcEntries.length === 0) continue; // 전부 면제인 경우 스킵(비정상)

    const anchorPool = byType[fcEntries[0][0]];
    for(const anchor of anchorPool){
      const ax = anchor._cur.x, ay = anchor._cur.y;
      const cluster = [];
      let valid = true;

      // 화학식 원소 클러스터
      for(const [e, count] of fcEntries){
        const close = byType[e].filter(p =>
          !cluster.includes(p) &&
          Math.hypot(p._cur.x-ax, p._cur.y-ay) < sR
        );
        if(close.length < count){ valid=false; break; }
        for(let k=0; k<count; k++) cluster.push(close[k]);
      }
      if(!valid) continue;

      // 불순물 탐색 (반경 내 1개 이상)
      if(impPool !== null){
        const impHit = impPool.find(p =>
          !cluster.includes(p) &&
          Math.hypot(p._cur.x-ax, p._cur.y-ay) < sR
        );
        if(!impHit){ continue; }
        cluster.push(impHit);
      }

      // 합성 성공
      const sx = cluster.reduce((s,p)=>s+p._cur.x,0)/cluster.length;
      const sy = cluster.reduce((s,p)=>s+p._cur.y,0)/cluster.length;
      LAST_SYNTH[gem.id] = now;
      synthesizeGem(gem, {x:sx,y:sy}, cluster);
      return;
    }
  }
}

function synthesizeGem(gemData, synthPos, cluster){
  const synthData = Object.assign({}, gemData, {_clicks:0, _breaking:false});
  const synthR = outerR * 0.15;

  // synthPos(절대) → wheelG 로컬 변환 (gSynth/gGlow 내 요소 배치용)
  const localSynth = toWheelLocal(synthPos.x, synthPos.y);

  // 링 + 원소 수렴 동시 시작 (1300ms)
  const harbG = gSynth.append('g')
    .attr('transform', `translate(${localSynth.x},${localSynth.y})`);
  const harbR = outerR*(0.28-0.22*Math.min(((synthData.price_tier||1)+(synthData.rarity||1)-2)/8,1));
  harbG.append('circle').attr('class','harbinger-ring')
    .attr('r', harbR * 0.85).attr('fill','none')
    .attr('stroke', hexA(gemData.hex, 0.85)).attr('stroke-width', 4.2);

  cluster.forEach(p => {
    const i = floatingList.indexOf(p);
    if(i >= 0) floatingList.splice(i, 1);

    const el = d3.select(p.node);

    // 백색 pulse → 수렴
    el.interrupt()
      .transition().duration(200).ease(d3.easeQuadOut)
        .style('filter', 'grayscale(0) brightness(4)')
        .style('opacity', 1)
      .transition().duration(1100).ease(d3.easeCubicIn)
        .style('filter', 'grayscale(1) brightness(2)')
        .style('opacity', 0)
        .attr('transform', `translate(${synthPos.x},${synthPos.y}) scale(0.04)`)
      .on('end', function(){ d3.select(this).remove(); });
  });
  bumpCount();

  // 1300ms 후: 링 종료 직후 목적지에서 즉시 소환 (이동 없음)
  setTimeout(()=>{
    harbG.remove();

    const R      = gemR(synthData);
    synthData._pR   = R + 5;
    synthData._circ = 2 * Math.PI * synthData._pR;

    const base   = getPos(synthData, currentAxis);
    const target = findFreePos(base, R);

    // 1300ms 경과 후 현재 회전각 기준으로 로컬 좌표 재계산
    const localSynthNow = toWheelLocal(synthPos.x, synthPos.y);

    // synthPos 잔류 shockwave (floatersG — 절대 좌표)
    const sw = floatersG.append('g').attr('transform',`translate(${synthPos.x},${synthPos.y})`);
    sw.append('circle').attr('r',5).attr('fill','none')
      .attr('stroke',hexA(synthData.hex,.7)).attr('stroke-width',2)
      .transition().duration(700).ease(d3.easeQuadOut)
      .attr('r', outerR*.18).attr('stroke-width',.1).style('opacity',0)
      .on('end',()=>sw.remove());

    // ── 합성 위치(외부 링)에서 등장 후 색상환 안쪽으로 이동 ─────────
    const grp = gSynth.append('g')
      .attr('transform', `translate(${localSynthNow.x},${localSynthNow.y})`)
      .style('cursor','pointer');

    const inner = grp.append('g');

    // 등장 burst: 바깥으로 짧게 터지는 링
    inner.append('circle').attr('r', R*1.2).attr('fill','none')
      .attr('stroke', hexA(synthData.hex,.8)).attr('stroke-width',1.8)
      .transition().duration(500).ease(d3.easeQuadOut)
      .attr('r', R*6).attr('stroke-width',.2).style('opacity',0);

    inner.append('circle').attr('class','gem-halo')
      .attr('r', R*2.5).attr('fill','none')
      .attr('stroke', hexA(synthData.hex,.45)).attr('stroke-width',.5)
      .style('opacity',0);

    // dot: 0에서 등장
    inner.append('circle').attr('class','gem-dot').attr('r',0)
      .attr('fill', hexA(synthData.hex,.78))
      .attr('stroke', hexA(synthData.hex,.9)).attr('stroke-width',.8)
      .transition().duration(400).ease(d3.easeBackOut.overshoot(1.5))
      .attr('r', R);

    inner.append('circle').attr('class','gem-progress')
      .attr('r', synthData._pR)
      .attr('transform','rotate(-90)').attr('fill','none').attr('stroke-width',1.2)
      .attr('stroke', hexA(synthData.hex,.9))
      .attr('stroke-dasharray', `0 ${synthData._circ}`);

    // glow: 합성 위치에서 함께 시작
    const glowG = gGlow.append('g').attr('class','gem-glow-pos synth-glow')
      .attr('transform', `translate(${localSynthNow.x},${localSynthNow.y})`);
    [[3.2,0.04],[2.0,0.09],[1.38,0.16]].forEach(([s,op])=>{
      glowG.append('circle').attr('r', R*s)
        .attr('fill', hexA(synthData.hex,op)).attr('stroke','none');
    });

    // 등장 후 내부 색상환 위치로 부드럽게 이동
    grp.transition().delay(450).duration(2400).ease(d3.easeCubicInOut)
      .attr('transform', `translate(${target.x},${target.y})`);
    glowG.transition().delay(450).duration(2400).ease(d3.easeCubicInOut)
      .attr('transform', `translate(${target.x},${target.y})`);

    const sg = { gemData:synthData, node:grp.node(), glowNode:glowG.node(), pos:{...target} };
    synthGems.push(sg);

    grp
      .on('mouseenter', function(e){
        showTooltip(e, synthData);
        if(!synthData._breaking){
          d3.select(this).select('.gem-halo').style('opacity',.45);
          d3.select(this).select('.gem-dot').attr('r', R*1.35);
        }
      })
      .on('mousemove',  function(e){ showTooltip(e, synthData); })
      .on('mouseleave', function(){
        hideTooltip();
        if(!synthData._breaking){
          d3.select(this).select('.gem-halo').style('opacity',0);
          d3.select(this).select('.gem-dot').attr('r', R);
        }
      })
      .on('click', function(e){ if(interactionMode==='area') return; onSynthClick(e, synthData, grp.node(), sg); });

    addLog('synth', synthData.name_ko, synthData.elements, synthData.hex);

  }, 1300);
}

// 합성 보석 클릭 핸들러
function onSynthClick(event, d, node, sg){
  if(d._breaking) return;
  showPanel(d);
  d._clicks = (d._clicks||0) + 1;
  const g = d3.select(node);
  const p = Math.min(d._clicks / d.hardness, 1);
  g.select('.gem-progress').attr('stroke-dasharray',`${p*d._circ} ${d._circ}`);
  g.select('.gem-dot').transition().duration(80).attr('r',gemR(d)*1.5)
    .transition().duration(160).attr('r',gemR(d));
  if(d._clicks >= d.hardness) decomposeSynth(node, d, sg);
}

// 합성 보석 분해 (리스폰 없음 — 원소만 방출하고 소멸)
function decomposeSynth(node, d, sg){
  d._breaking = true;
  const g = d3.select(node); const R = gemR(d);

  // 후광 즉시 페이드아웃 (분해 시작과 동시)
  if(sg.glowNode)
    d3.select(sg.glowNode).transition().duration(300).style('opacity',0);
  g.select('.gem-dot')
    .transition().duration(140).attr('r',R*2.4).attr('stroke-width',2.4)
    .transition().duration(360).attr('r',0).style('opacity',0);
  g.select('.gem-halo')
    .transition().duration(520).attr('r',outerR*.3).style('opacity',0);
  g.select('.gem-progress').transition().duration(400).style('opacity',0);

  // sg.pos는 wheelG 로컬 좌표 → 실제 화면 좌표로 변환
  const absS = toAbsolute(sg.pos.x, sg.pos.y);
  const ox = absS.x, oy = absS.y;
  const N_PER = 3;
  d.elements.forEach((sym,ei)=>{
    const eData = ELEMENT_DATA[sym]||{mass:14,color:'#e2dfd8'};
    const omega = BASE_OMEGA / Math.sqrt(eData.mass/1.008);
    for(let i=0;i<N_PER;i++){
      const ang  = Math.random()*Math.PI*2;
      const donutR = outerR * (1.08 + Math.random() * 0.42);
      const tx   = cx + Math.cos(ang)*donutR, ty = cy + Math.sin(ang)*donutR;
      const fpeak= (Math.random()-.5)*360, fend=(Math.random()-.5)*28;
      const delay= ei*35+i*18;
      const eg   = floatersG.append('g').attr('class','elemGlyph')
        .style('opacity',0).style('filter','grayscale(0) brightness(1)')
        .attr('transform',`translate(${ox},${oy})`);
      eg.append('circle').attr('r',7)
        .attr('fill',hexA(eData.color,.1)).attr('stroke',hexA(eData.color,.7)).attr('stroke-width',1);
      eg.append('text').attr('dy','.35em').attr('fill',eData.color)
        .attr('font-size','8px').text(sym);
      const fd = 1250+Math.random()*450;

      // 비행 trail
      const trail = floatersG.append('line')
        .attr('x1',ox).attr('y1',oy)
        .attr('x2',ox).attr('y2',oy)
        .attr('stroke', hexA(d.hex, 0.38))
        .attr('stroke-width', 1.6)
        .attr('stroke-linecap','round')
        .style('opacity',0);
      trail.transition().delay(delay+130).duration(fd).ease(d3.easeQuadOut)
        .attr('x2',tx).attr('y2',ty).style('opacity',0.38)
        .transition().duration(380).style('opacity',0)
        .on('end',function(){ d3.select(this).remove(); });
      eg.transition().delay(delay).duration(130).style('opacity',.85)
        .transition().duration(fd).ease(d3.easeQuadOut)
        .attrTween('transform',function(){
          return u=>{
            const x=ox+(tx-ox)*u, y=oy+(ty-oy)*u;
            return `translate(${x},${y}) rotate(${fpeak*Math.sin(u*Math.PI)+fend*u})`;
          };
        })
        .on('end',function(){
          const r0=Math.hypot(tx-cx,ty-cy), theta0=Math.atan2(ty-cy,tx-cx);
          const omegaK3 = omega / Math.sqrt(Math.max(r0,1) / outerR);
          floatingList.push({node:this,r0,theta0,entryTime:performance.now(),omega:omegaK3,flightRotEnd:fend,absX:tx,absY:ty,gemId:`synth_${d.id}`,sym});
          bumpCount(); startFloatLoop();
        });
      eg.transition('color').delay(delay+130+fd).duration(10000).ease(d3.easeLinear)
        .style('opacity',.5).style('filter','grayscale(1) brightness(0.55)');
    }
  });
  setTimeout(()=>{
    const idx = synthGems.indexOf(sg);
    if(idx>=0) synthGems.splice(idx,1);
    d3.select(node).remove();
    if(sg.glowNode) d3.select(sg.glowNode).remove();
  }, 2200);
}

// ══ INTERACTION MODE ══════════════════════════════════════════════
let interactionMode = 'single';
const AREA_R = () => outerR * 0.14;
let areaCursor = null;

function setMode(mode){
  interactionMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === mode)
  );
  svgEl.style('cursor', mode === 'area' ? 'crosshair' : null);
  if(mode !== 'area' && areaCursor){ areaCursor.remove(); areaCursor = null; }
}

// 범위 파괴 — 커서 링
svgEl.on('mousemove.mode', function(event){
  if(interactionMode !== 'area') return;
  const [mx, my] = d3.pointer(event);
  if(!areaCursor){
    areaCursor = floatersG.append('circle').attr('pointer-events','none')
      .attr('fill','none')
      .attr('stroke','rgba(226,201,140,.3)')
      .attr('stroke-width',.8)
      .attr('stroke-dasharray','3 5');
  }
  areaCursor.attr('cx',mx).attr('cy',my).attr('r',AREA_R());
});

svgEl.on('mouseleave.mode', function(){
  if(areaCursor){ areaCursor.remove(); areaCursor = null; }
});

// 범위 파괴 — 클릭
svgEl.on('click.mode', function(event){
  if(interactionMode !== 'area') return;
  const [mx, my] = d3.pointer(event);
  const aR = AREA_R();

  // 클릭 ripple
  const ripple = floatersG.append('circle')
    .attr('cx',mx).attr('cy',my).attr('r',aR*.3)
    .attr('fill','none')
    .attr('stroke',hexA('#c8a96e',.7)).attr('stroke-width',1.4);
  ripple.transition().duration(520).ease(d3.easeQuadOut)
    .attr('r',aR*1.15).attr('stroke-width',.1).style('opacity',0)
    .on('end',function(){ d3.select(this).remove(); });

  // 범위 내 일괄파괴 — 로그는 단건 요약으로
  _batchingDestroy = true;
  _batchQueue = [];

  gGems.selectAll('.gem-pos').each(function(d){
    if(d._breaking) return;
    const abs = toAbsolute(d._x, d._y);
    if(Math.hypot(abs.x-mx, abs.y-my) <= aR) decompose(this, d);
  });
  [...synthGems].forEach(sg => {
    if(sg.gemData._breaking) return;
    const abs = toAbsolute(sg.pos.x, sg.pos.y);
    if(Math.hypot(abs.x-mx, abs.y-my) <= aR) decomposeSynth(sg.node, sg.gemData, sg);
  });

  _batchingDestroy = false;
  _flushBatch();
});

document.querySelectorAll('.mode-btn').forEach(btn =>
  btn.addEventListener('click', () => setMode(btn.dataset.mode))
);

// ══ AXIS BUTTONS ════════════════════════════════════════════════
document.querySelectorAll('.axis-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.axis-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentAxis = btn.dataset.axis;
    render(currentAxis, true);
  });
});

// ══ WHEEL ROTATION ════════════════════════════════════════════════
const WHEEL_DEG_PER_SEC = 0.8; // 0.8°/s → 7.5분에 한 바퀴
let currentWheelAngle = 0;

// wheelG 로컬 좌표 → 화면 절대 좌표 (floatersG 등 회전 밖 레이어용)
function toAbsolute(lx, ly){
  const rad = currentWheelAngle * Math.PI / 180;
  const dx = lx - cx, dy = ly - cy;
  return {
    x: cx + dx*Math.cos(rad) - dy*Math.sin(rad),
    y: cy + dx*Math.sin(rad) + dy*Math.cos(rad)
  };
}
// 화면 절대 좌표 → wheelG 로컬 좌표 (gSynth/gGlow 내부 배치용)
function toWheelLocal(ax, ay){
  const rad = -currentWheelAngle * Math.PI / 180;
  const dx = ax - cx, dy = ay - cy;
  return {
    x: cx + dx*Math.cos(rad) - dy*Math.sin(rad),
    y: cy + dx*Math.sin(rad) + dy*Math.cos(rad)
  };
}

function startWheelRotation(){
  let t0 = null;
  function step(now){
    if(!t0) t0 = now;
    currentWheelAngle = ((now - t0) / 1000 * WHEEL_DEG_PER_SEC) % 360;
    wheelG.attr('transform', `rotate(${currentWheelAngle},${cx},${cy})`);
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ══ INIT ════════════════════════════════════════════════════════
render('color', false);
startWheelRotation();
setInterval(checkSynthesis, 2000);
window.addEventListener('resize',()=>{
  resize();
  // 부유 원소 궤도 중심 재계산
  floatingList.forEach(p=>{
    p.r0=Math.hypot(p.absX-cx,p.absY-cy);
    const massV = (window.ELEMENT_DATA&&ELEMENT_DATA[p.sym])?ELEMENT_DATA[p.sym].mass:12;
    const baseOm = BASE_OMEGA/Math.sqrt(massV/1.008);
    p.omega = baseOm / Math.sqrt(Math.max(p.r0,1)/outerR);
    p.theta0=Math.atan2(p.absY-cy,p.absX-cx);
    p.entryTime=performance.now();
  });
  render(currentAxis, false);
});
</script>
